version: '3.8'

services:
  # Next.js Merchant Dashboard Frontend
  advanced-pay-frontend:
    build: 
      context: ./Advanced Payemnt
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - payment-gateway-api
    networks:
      - fintech-network

  # Core Golang Backend Engine
  payment-gateway-api:
    build:
      context: ./payment-gateway-backend
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_URL=postgres://advancedpay:securepass123@postgres:5432/gateway_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379/1
      - VAULT_SECURITY_KEY=ADVANCEDPAY-32-BYTE-VAULT-KEY-XX
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - fintech-network

  # Immutable Tier-1 Distributed PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=advancedpay
      - POSTGRES_PASSWORD=securepass123
      - POSTGRES_DB=gateway_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network

  # High-Speed Redis (L1 Memory Cache & Rate Limiting)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fintech-network

  # Zookeeper (Required for Kafka orchestration)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fintech-network

  # Apache Kafka (Massive Scale Tier-2 Analytics Pipeline)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fintech-network

networks:
  fintech-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
